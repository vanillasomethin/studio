# ─────────────────────────────────────────────────────────────────────────
# RuView (WiFi CSI) — per-store NVS provisioning config
# Target: ESP32-S3 N16R8
# Flash once with the generic RuView firmware image, then push this config
# at runtime via `provision.py` (see bottom) — zero recompile per store.
# ─────────────────────────────────────────────────────────────────────────

[wifi]
ssid        = "${STORE_WIFI_SSID}"
password    = "${STORE_WIFI_PASSWORD}"

[node]
id          = "${store_id}_ruview"
store_id    = "${store_id}"

[mqtt]
host        = "${MQTT_HOST}"          # <cluster-id>.s1.eu.hivemq.cloud
port        = 8883
tls         = true                     # TLS only — no plaintext, ever
username    = "${MQTT_USERNAME}"
password    = "${MQTT_PASSWORD}"

# Topics this node publishes to. ${store_id} is substituted at provision time.
topic_customer_flow     = "alive/${store_id}/retail/customer_flow"
topic_shelf_interaction = "alive/${store_id}/retail/shelf_interaction"
topic_queue             = "alive/${store_id}/retail/queue"
topic_heartbeat         = "alive/${store_id}/device/ruview_heartbeat"
heartbeat_interval_sec  = 60

[edge_modules]
# Enabled CSI analysis modules. Each publishes to its own topic above.
customer-flow    = enabled
shelf-interaction = enabled
queue-monitor    = enabled

[presence]
# Initial threshold is 0 — the node self-calibrates against the empty-store
# noise floor during the daily baseline window below, then raises this value.
threshold        = 0
auto_calibrate   = true
calibrate_window_start = "06:00"   # IST
calibrate_window_end   = "07:00"   # IST
calibrate_duration_sec = 60

[ota]
enabled     = true
password    = "${OTA_PASSWORD}"   # required — OTA endpoint rejects unauthenticated updates

# ─────────────────────────────────────────────────────────────────────────
# Provisioning (zero recompile — NVS runtime override)
#
# Flash the generic firmware image once via the Chrome web flasher, then for
# each store run:
#
#   python3 provision.py \
#     --port /dev/ttyUSB0 \
#     --store-id store_mangaluru_001 \
#     --wifi-ssid "Kirana-Store-WiFi" \
#     --wifi-password "••••••••" \
#     --mqtt-host "abc123.s1.eu.hivemq.cloud" \
#     --mqtt-username "alive-footfall-worker" \
#     --mqtt-password "••••••••" \
#     --ota-password "••••••••"
#
# This writes the substituted values for ${store_id}, ${STORE_WIFI_SSID},
# ${STORE_WIFI_PASSWORD}, ${MQTT_HOST}, ${MQTT_USERNAME}, ${MQTT_PASSWORD}
# and ${OTA_PASSWORD} into the device's NVS partition over serial — the
# compiled firmware image itself never changes between stores.
# ─────────────────────────────────────────────────────────────────────────
